<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Rounded Rect with Gradient background -->
  <rect width="32" height="32" rx="7.5" fill="url(#grad)" />
  
  <!-- Share2 Icon in White -->
  <g stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(4, 4) scale(1)">
      <circle cx="18" cy="5" r="3" fill="none"/>
      <circle cx="6" cy="12" r="3" fill="none"/>
      <circle cx="18" cy="19" r="3" fill="none"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
    </g>
  </g>
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" /> <!-- violet-600 -->
      <stop offset="100%" stop-color="#4f46e5" /> <!-- indigo-600 -->
    </linearGradient>
  </defs>
</svg>
